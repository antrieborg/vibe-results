---
- name: Install and configure nginx on target nodes
  hosts: targets
  become: true

  handlers:
    - name: Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted

  tasks:
    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Ensure nginx default config is present
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/default
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;

              root /var/www/html;
              index index.html index.htm;

              server_name _;

              location / {
                  try_files $uri $uri/ =404;
              }
          }
        mode: "0644"
        owner: root
        group: root
      notify: Restart nginx

    - name: Create custom index page
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        content: |
          <!DOCTYPE html>
          <html>
            <head><title>Welcome</title></head>
            <body>
              <h1>Hello from {{ inventory_hostname }}</h1>
              <p>Nginx is running and managed by Ansible.</p>
            </body>
          </html>
        mode: "0644"
        owner: www-data
        group: www-data

    - name: Ensure /var/www/html directory has correct permissions
      ansible.builtin.file:
        path: /var/www/html
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Start and enable nginx
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true

    - name: Allow SSH through UFW
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Allow HTTP through UFW
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Enable UFW
      community.general.ufw:
        state: enabled

    - name: Wait for nginx to be reachable on port 80
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 80
        timeout: 30
        state: started
